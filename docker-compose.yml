version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hermes-backend
    ports:
      - "8010:8000"
    volumes:
      - ./backend/data:/app/data
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    command: python main.py
    networks:
      - default
      - agent-whisper_default

  frontend:
    image: nginx:alpine
    container_name: hermes-frontend
    ports:
      - "3005:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

networks:
  agent-whisper_default:
    external: true

volumes:
  hermes_data:
